stages:
  - build
  - test
  - migrate
  - deploy

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  DEPLOY_PATH: "/home/ubuntu/squiz"
  COMPOSE_HTTP_TIMEOUT: "300"

# ===========================================
# Build Stage
# ===========================================
build:
  stage: build
  script:
    - cd modustudy/backend
    - chmod +x gradlew
    - ./gradlew build -x test
  only:
    - master
    - main
  tags:
    - docker

# ===========================================
# Test Stage
# ===========================================
test:
  stage: test
  script:
    - cd modustudy/backend
    - chmod +x gradlew
    # 테스트 DB 초기화 (이전 스키마/제약조건 제거)
    - source /etc/environment && mysql -h${DB_HOST:-localhost} -u${DB_USERNAME} -p${DB_PASSWORD} -e "DROP DATABASE IF EXISTS ssafy_test_db; CREATE DATABASE ssafy_test_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;" || echo "DB reset skipped"
    - source /etc/environment && export SPRING_PROFILES_ACTIVE=test && ./gradlew test
  only:
    - master
    - main
  tags:
    - docker

# ===========================================
# Migrate Stage (DB 마이그레이션)
# ===========================================
migrate:
  stage: migrate
  script:
    - cd modustudy/backend
    - chmod +x gradlew
    # 배포 전 DB 백업 (버전 포함)
    - ssh ubuntu@localhost "cd /home/ubuntu/squiz && ./scripts/backup-db.sh manual" || true
    # Flyway 마이그레이션 실행
    - source /etc/environment && ./gradlew flywayInfo
    - source /etc/environment && ./gradlew flywayMigrate
  only:
    - master
    - main
  tags:
    - docker
  when: manual
  allow_failure: false

# ===========================================
# Deploy Stage (자동 배포)
# ===========================================
deploy:
  stage: deploy
  script:
    # 프로젝트 파일 배포 경로로 복사
    - rsync -av --delete --exclude '.git' --exclude 'node_modules' --exclude '.gradle' --exclude 'build' --exclude '.env' --exclude 'ssl' --exclude 'init.sql' modustudy/ $DEPLOY_PATH/
    # Docker Compose v2로 무중단 배포
    - cd $DEPLOY_PATH
    - docker compose up -d --build --force-recreate --remove-orphans
    - docker image prune -f
    # 배포 결과 확인
    - docker compose ps
  only:
    - master
    - main
  tags:
    - docker
