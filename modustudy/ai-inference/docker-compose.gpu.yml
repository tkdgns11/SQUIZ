# AI 추론 서버 Docker Compose (GPU 버전)
# 사용법: docker-compose -f docker-compose.gpu.yml up -d

version: '3.8'

services:
  ai-inference:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: modustudy-ai-inference-gpu
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
    environment:
      - MODEL_PATH=/app/models/qwen3-8b-summarizer-q4km.gguf
      - WHISPER_MODEL=${WHISPER_MODEL:-medium}
      - WHISPER_DEVICE=cuda
      - N_CTX=${N_CTX:-4096}
      - N_GPU_LAYERS=-1
      - N_THREADS=${N_THREADS:-4}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  redis:
    image: redis:7-alpine
    container_name: modustudy-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
