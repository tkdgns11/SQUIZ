# =============================================
# Local Development Configuration
# =============================================
# Usage: --spring.profiles.active=local

# OAuth2 Redirect URIs (localhost for local development)
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:3000/login/callback
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost:3000/login/callback
spring.security.oauth2.client.registration.naver.redirect-uri=http://localhost:3000/login/callback

# SFU URL (localhost)
app.sfu.base-url=http://localhost:4000

# Frontend URL
app.frontend.url=http://localhost:3000

# CORS (allow all for local dev)
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080
