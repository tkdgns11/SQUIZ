# =============================================
# Local Development Configuration
# =============================================
# Usage: --spring.profiles.active=local

# JPA - Flyway가 스키마 관리하므로 validate만
spring.jpa.hibernate.ddl-auto=validate

# OAuth2 Redirect URIs (localhost for local development)
spring.security.oauth2.client.registration.google.redirect-uri=https://modustudy.local:3000/login/callback
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.kakao.redirect-uri=https://modustudy.local:3000/login/callback
spring.security.oauth2.client.registration.naver.redirect-uri=https://modustudy.local:3000/login/callback

# SFU URL (localhost)
app.sfu.base-url=http://localhost:4000

# Frontend URL
app.frontend.url=http://localhost:3000

# CORS (allow all for local dev)
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080
