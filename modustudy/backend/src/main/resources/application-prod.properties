# ===========================================
# Production Profile (application-prod.properties)
# ===========================================
# 이 파일은 배포 환경에서 application.properties를 오버라이드합니다.
# docker-compose.yml에서 SPRING_PROFILES_ACTIVE=prod로 활성화됩니다.

# ===========================================
# Server
# ===========================================
server.port=8080

# ===========================================
# Database (Docker 내부 네트워크)
# ===========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/squiz?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:squiz}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA - 운영환경에서는 validate 권장
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===========================================
# Logging (운영환경)
# ===========================================
logging.level.root=INFO
logging.level.com.ssafy=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# ===========================================
# OAuth2 Redirect URI (배포 도메인)
# ===========================================
# 환경변수로 도메인 설정 가능 (기본값: i14d106.p.ssafy.io)
app.domain=${APP_DOMAIN:https://i14d106.p.ssafy.io}

# Kakao OAuth2
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_REST_API_KEY:}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET_KEY:}
spring.security.oauth2.client.registration.kakao.redirect-uri=${APP_DOMAIN:https://i14d106.p.ssafy.io}/login/callback

# Naver OAuth2
spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID:}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET:}
spring.security.oauth2.client.registration.naver.redirect-uri=${APP_DOMAIN:https://i14d106.p.ssafy.io}/login/callback

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.redirect-uri=${APP_DOMAIN:https://i14d106.p.ssafy.io}/login/callback

# ===========================================
# CORS (배포 도메인만 허용)
# ===========================================
app.cors.allowed-origins=${app.domain}

# ===========================================
# SFU (WebRTC)
# ===========================================
app.sfu.base-url=${APP_SFU_BASE_URL:wss://i14d106.p.ssafy.io/sfu}

# ===========================================
# Redis
# ===========================================
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# ===========================================
# File Upload
# ===========================================
app.storage.base-path=/app/uploads
spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=1GB

# ===========================================
# PDF Font (Linux)
# ===========================================
meeting.pdf.font-path=/usr/share/fonts/truetype/nanum/NanumGothic.ttf
