# Server
server.port=8080
server.ssl.enabled=${SSL_ENABLED:true}
server.ssl.certificate=${SSL_CERT:../modustudy.local.pem}
server.ssl.certificate-private-key=${SSL_KEY:../modustudy.local-key.pem}
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ssafy_web_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:ssafy}
spring.datasource.password=${DB_PASSWORD:ssafy}

# JPA - \uD658\uACBD\uBCC0\uC218\uB85C \uAD00\uB9AC (\uB85C\uCEEC: update, \uC6B4\uC601: validate)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# Flyway (DB \uB9C8\uC774\uADF8\uB808\uC774\uC158)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=false

# MyBatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-fetch-size=100
mybatis.configuration.default-statement-timeout=30

# JWT
jwt.secret=${JWT_SECRET:default-secret-key-for-development-only-do-not-use-in-production}
jwt.access-token-validity=21600000
jwt.refresh-token-validity=604800000


# Swagger (springdoc)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json

# Jackson (JSON 직렬화)
spring.jackson.time-zone=Asia/Seoul
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.root=INFO
logging.level.com.ssafy=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# DevTools
spring.devtools.livereload.enabled=true

# Compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css

# SPA
spa.default-file=/dist/index.html
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# WebSocket
app.cors.allowed-origins=*

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# AI 추론 서버 (GPU 서버: 3.236.114.39)
app.ai-server.base-url=${APP_AI_SERVER_BASE_URL:http://3.38.92.48:8000}

# SFU (WebRTC signaling + ICE)
app.sfu.base-url=${APP_SFU_BASE_URL:https://modustudy.local:4000}
app.sfu.control-url=${APP_SFU_CONTROL_URL:https://modustudy.local:4000}
app.sfu.allow-insecure=${APP_SFU_ALLOW_INSECURE:true}
app.sfu.ice-servers[0].urls=${APP_STUN_URL:stun:stun.l.google.com:19302}
app.sfu.ice-servers[1].urls=${APP_TURN_URL:}
app.sfu.ice-servers[1].username=${APP_TURN_USERNAME:}
app.sfu.ice-servers[1].credential=${APP_TURN_CREDENTIAL:}

# Local file storage
app.storage.base-path=./uploads

# Upload limits (video recordings can be large)
spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=1GB

# Kakao OAuth2
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_REST_API_KEY:test}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET_KEY:test}
spring.security.oauth2.client.registration.kakao.redirect-uri=${KAKAO_RTC_TEST:https://localhost:3000/login/callback}
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.scope=profile_image,account_email

# Kakao Provider
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id
# PDF export font (for Korean)
meeting.pdf.font-path=C:/Windows/Fonts/malgun.ttf

# Naver ?? ??
naver.client-id=${NAVER_CLIENT_ID:test}
naver.client-secret=${NAVER_CLIENT_SECRET:test}

# Naver OAuth2
spring.security.oauth2.client.registration.naver.client-id=${naver.client-id:test}
spring.security.oauth2.client.registration.naver.client-secret=${naver.client-secret:test}
spring.security.oauth2.client.registration.naver.redirect-uri=https://localhost:3000/login/callback
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.scope=name,email,profile_image

# Naver Provider
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:test}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:test}
# spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:3000/login/callback
spring.security.oauth2.client.registration.google.redirect-uri=https://localhost:3000/login/callback
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.scope=profile,email,https://www.googleapis.com/auth/calendar

# Google Provider
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub


# send mail (password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:test@test.com}
spring.mail.password=${MAIL_PASSWORD:test}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# front url
 app.frontend.url=https://localhost:3000
#app.frontend.url=https://modustudy.local:3000

# Naver News API
naver.api.client-id=${naver.client-id}
naver.api.client-secret=${naver.client-secret}
naver.api.news-url=https://openapi.naver.com/v1/search/news.json

# ===== Quartz Scheduler ?? (JDBC ??) =====
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=never

# Quartz ?? ??
spring.quartz.properties.org.quartz.scheduler.instanceName=NewsScheduler
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO

# Thread Pool ??
spring.quartz.properties.org.quartz.threadPool.threadCount=5

# JobStore ?? (MySQL)
spring.quartz.properties.org.quartz.jobStore.class=org.springframework.scheduling.quartz.LocalDataSourceJobStore
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate
spring.quartz.properties.org.quartz.jobStore.tablePrefix=qrtz_
spring.quartz.properties.org.quartz.jobStore.isClustered=true
spring.quartz.properties.org.quartz.jobStore.clusterCheckinInterval=20000