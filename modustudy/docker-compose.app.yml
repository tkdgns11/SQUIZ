# ===========================================
# 애플리케이션 서비스
# ===========================================

services:
  # ===========================================
  # Frontend (Nginx + React)
  # ===========================================
  frontend:
    image: tkdgns11/squiz-frontend:latest
    container_name: squiz-frontend
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - squiz-network

  # ===========================================
  # Backend (Spring Boot - API + WebSocket)
  # ===========================================
  backend:
    image: tkdgns11/squiz-backend:latest
    container_name: squiz-backend
    expose:
      - "8080"
    volumes:
      - uploads-data:/app/uploads
      - /home/ubuntu/config/firebase-service-account.json:/app/config/firebase-service-account.json:ro
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://squiz-mysql:3306/squiz?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=squiz-redis
      - REDIS_PORT=6379
      - APP_DOMAIN=${APP_DOMAIN:-https://i14d106.p.ssafy.io}
      - JWT_SECRET=${JWT_SECRET}
      - KAKAO_REST_API_KEY=${KAKAO_REST_API_KEY}
      - KAKAO_CLIENT_SECRET_KEY=${KAKAO_CLIENT_SECRET_KEY}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - APP_SFU_CONTROL_URL=https://3.38.92.48:4000
      - APP_SFU_BASE_URL=wss://i14d106.p.ssafy.io
      # TURN 불필요 - SFU가 AI 서버에서 직접 UDP 연결
      - APP_AI_SERVER_BASE_URL=http://3.38.92.48:8000
      - FIREBASE_CREDENTIALS_PATH=/app/config/firebase-service-account.json
    restart: unless-stopped
    networks:
      - squiz-network

  # ===========================================
  # SFU Server - AI 서버(3.38.92.48)로 이전됨
  # ai-inference/docker-compose.sfu.yml 참고
  # ===========================================

  # ===========================================
  # CS Quiz AI Service (Flask)
  # ===========================================
  cs-quiz-ai:
    image: tkdgns11/squiz-cs-quiz-ai:latest
    container_name: squiz-cs-quiz-ai
    expose:
      - "5000"
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - DEBUG=False
      - CORS_ORIGINS=https://i14d106.p.ssafy.io,http://localhost:5173
    restart: unless-stopped
    networks:
      - squiz-network

networks:
  squiz-network:
    external: true
    name: squiz-network

volumes:
  uploads-data:
    external: true
    name: squiz-uploads
