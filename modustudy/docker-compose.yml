# ===========================================
# 공유 서비스
# ===========================================

services:
  # ===========================================
  # MySQL
  # ===========================================
  mysql:
    image: mysql:8.0
    container_name: squiz-mysql
    ports:
      - "3306:3306"
    environment:
      - TZ=Asia/Seoul
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=squiz
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone='+09:00'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - squiz-network

  # ===========================================
  # Redis (Session / Cache)
  # ===========================================
  redis:
    image: redis:alpine
    container_name: squiz-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - squiz-network

  # ===========================================
  # SFU/TURN - AI 서버(3.38.92.48)로 이전됨
  # ai-inference/docker-compose.sfu.yml 참고
  # ===========================================

  # ===========================================
  # Monitor Server (서버 모니터링)
  # ===========================================
  monitor:
    build: ./monitor-server
    container_name: squiz-monitor
    expose:
      - "9090"
    environment:
      - PORT=9090
      - MONITOR_API_KEY=${MONITOR_API_KEY:-squiz-monitor-secret}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - squiz-network

# ===========================================
# Networks (외부 네트워크 - 미리 생성 필요)
# ===========================================
networks:
  squiz-network:
    external: true
    name: squiz-network

# ===========================================
# Volumes
# ===========================================
volumes:
  mysql-data:
  redis-data:
  uploads-data:
    name: squiz-uploads
