services:
  # ===========================================
  # Nginx (Reverse Proxy + Frontend)
  # ===========================================
  nginx:
    image: tkdgns11/squiz-frontend:latest
    container_name: squiz-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - sfu-server
    restart: unless-stopped
    networks:
      - squiz-network

  # ===========================================
  # Backend (Spring Boot - API + WebSocket)
  # ===========================================
  backend:
    image: tkdgns11/squiz-backend:latest
    container_name: squiz-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/squiz?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # App Domain
      - APP_DOMAIN=${APP_DOMAIN:-https://i14d106.p.ssafy.io}
      # JWT
      - JWT_SECRET=${JWT_SECRET}
      # OAuth2 - Kakao
      - KAKAO_REST_API_KEY=${KAKAO_REST_API_KEY}
      - KAKAO_CLIENT_SECRET_KEY=${KAKAO_CLIENT_SECRET_KEY}
      # OAuth2 - Naver
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET}
      # OAuth2 - Google
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - squiz-network

  # ===========================================
  # CS Quiz AI Service (Flask)
  # ===========================================
  cs-quiz-ai:
    image: tkdgns11/squiz-cs-quiz-ai:latest
    container_name: squiz-cs-quiz-ai
    ports:
      - "5000:5000"
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - DEBUG=False
      - CORS_ORIGINS=https://i14d106.p.ssafy.io,http://localhost:5173
    restart: unless-stopped
    networks:
      - squiz-network

  # ===========================================
  # SFU Server (Mediasoup)
  # ===========================================
  sfu-server:
    image: tkdgns11/squiz-sfu:latest
    container_name: squiz-sfu
    ports:
      - "4000:4000"
      - "20000-22000:20000-22000/udp"  # RTC UDP ports
    environment:
      - NODE_ENV=production
      - SFU_SSL_KEY_PATH=/ssl/sfu-key.pem
      - SFU_SSL_CERT_PATH=/ssl/sfu-cert.pem
      - SFU_ANNOUNCED_IP=i14d106.p.ssafy.io
    volumes:
      - ./ssl:/ssl:ro
    restart: unless-stopped
    networks:
      - squiz-network

  # ===========================================
  # MySQL
  # ===========================================
  mysql:
    image: mysql:8.0
    container_name: squiz-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=squiz
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - squiz-network

  # ===========================================
  # Redis (Session / Cache)
  # ===========================================
  redis:
    image: redis:alpine
    container_name: squiz-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - squiz-network

# ===========================================
# Networks
# ===========================================
networks:
  squiz-network:
    driver: bridge

# ===========================================
# Volumes
# ===========================================
volumes:
  mysql-data:
  redis-data:
