<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squiz Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .header {
      background: #1e293b;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #334155;
    }
    .header h1 { font-size: 1.5rem; color: #38bdf8; }
    .header .status { display: flex; align-items: center; gap: 0.5rem; }
    .header .status .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #22c55e; animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .container { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }

    /* Auth */
    .auth-container {
      display: flex; justify-content: center; align-items: center;
      height: 80vh;
    }
    .auth-box {
      background: #1e293b; padding: 2rem; border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    .auth-box input {
      padding: 0.75rem 1rem; border: 1px solid #334155;
      background: #0f172a; color: #e2e8f0; border-radius: 6px;
      width: 250px; margin-right: 0.5rem;
    }
    .auth-box button {
      padding: 0.75rem 1.5rem; background: #38bdf8; color: #0f172a;
      border: none; border-radius: 6px; cursor: pointer; font-weight: 600;
    }

    /* Grid */
    .grid { display: grid; gap: 1.5rem; margin-bottom: 1.5rem; }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    @media (max-width: 1024px) {
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
      .grid-2 { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .grid-4 { grid-template-columns: 1fr; }
    }

    /* Cards */
    .card {
      background: #1e293b; border-radius: 12px; padding: 1.5rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem;
    }
    .card-title { font-size: 0.875rem; color: #94a3b8; text-transform: uppercase; }
    .card-value { font-size: 2rem; font-weight: 700; }
    .card-sub { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; }

    /* Progress Bar */
    .progress-bar {
      height: 8px; background: #334155; border-radius: 4px;
      overflow: hidden; margin-top: 0.75rem;
    }
    .progress-fill {
      height: 100%; border-radius: 4px; transition: width 0.5s ease;
    }
    .progress-green { background: linear-gradient(90deg, #22c55e, #4ade80); }
    .progress-yellow { background: linear-gradient(90deg, #eab308, #facc15); }
    .progress-red { background: linear-gradient(90deg, #ef4444, #f87171); }

    /* Container List */
    .container-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem; background: #0f172a; border-radius: 8px;
      margin-bottom: 0.75rem;
    }
    .container-item:last-child { margin-bottom: 0; }
    .container-info { display: flex; align-items: center; gap: 1rem; }
    .container-status {
      width: 12px; height: 12px; border-radius: 50%;
    }
    .status-running { background: #22c55e; }
    .status-exited { background: #ef4444; }
    .status-other { background: #eab308; }
    .container-name { font-weight: 600; }
    .container-image { font-size: 0.75rem; color: #64748b; }
    .container-stats { display: flex; gap: 1.5rem; font-size: 0.875rem; }
    .container-actions button {
      padding: 0.5rem 1rem; background: #334155; color: #e2e8f0;
      border: none; border-radius: 6px; cursor: pointer; margin-left: 0.5rem;
    }
    .container-actions button:hover { background: #475569; }
    .container-actions button.btn-logs { background: #3b82f6; }

    /* Logs Modal */
    .modal {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8); z-index: 1000; padding: 2rem;
    }
    .modal.active { display: flex; justify-content: center; align-items: flex-start; }
    .modal-content {
      background: #1e293b; border-radius: 12px; width: 100%; max-width: 1000px;
      max-height: 80vh; display: flex; flex-direction: column;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 1.5rem; border-bottom: 1px solid #334155;
    }
    .modal-header h3 { font-size: 1.125rem; }
    .modal-close {
      background: none; border: none; color: #94a3b8; font-size: 1.5rem;
      cursor: pointer;
    }
    .modal-body {
      flex: 1; overflow: auto; padding: 1rem;
    }
    .log-content {
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 0.75rem; line-height: 1.6;
      white-space: pre-wrap; word-break: break-all;
      background: #0f172a; padding: 1rem; border-radius: 8px;
      max-height: 60vh; overflow-y: auto;
    }
    .log-line { padding: 2px 0; }
    .log-line:hover { background: #1e293b; }

    /* Refresh */
    .refresh-info {
      text-align: center; padding: 1rem; color: #64748b; font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div id="auth" class="auth-container">
    <div class="auth-box">
      <h2 style="margin-bottom: 1rem; color: #38bdf8;">Squiz Monitor</h2>
      <input type="password" id="apiKeyInput" placeholder="API Key" />
      <button onclick="authenticate()">Login</button>
    </div>
  </div>

  <div id="app" style="display: none;">
    <div class="header">
      <h1>Squiz Server Monitor</h1>
      <div class="status">
        <div class="dot"></div>
        <span id="lastUpdate">-</span>
      </div>
    </div>

    <div class="container">
      <!-- System Stats -->
      <div class="grid grid-4">
        <div class="card">
          <div class="card-header">
            <span class="card-title">CPU Usage</span>
          </div>
          <div class="card-value" id="cpuValue">--%</div>
          <div class="card-sub" id="cpuCores">- cores</div>
          <div class="progress-bar">
            <div class="progress-fill progress-green" id="cpuBar" style="width: 0%"></div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title">Memory Usage</span>
          </div>
          <div class="card-value" id="memValue">--%</div>
          <div class="card-sub" id="memDetail">- / -</div>
          <div class="progress-bar">
            <div class="progress-fill progress-green" id="memBar" style="width: 0%"></div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title">Disk Usage</span>
          </div>
          <div class="card-value" id="diskValue">--%</div>
          <div class="card-sub" id="diskDetail">- / -</div>
          <div class="progress-bar">
            <div class="progress-fill progress-green" id="diskBar" style="width: 0%"></div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title">Network</span>
          </div>
          <div class="card-value" id="netValue">-</div>
          <div class="card-sub" id="netDetail">RX: - / TX: -</div>
        </div>
      </div>

      <!-- Containers -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Containers</span>
          <button onclick="fetchContainers()" style="padding: 0.5rem 1rem; background: #334155; border: none; border-radius: 6px; color: #e2e8f0; cursor: pointer;">Refresh</button>
        </div>
        <div id="containerList">Loading...</div>
      </div>

      <div class="refresh-info">
        Auto refresh every 5 seconds
      </div>
    </div>
  </div>

  <!-- Logs Modal -->
  <div class="modal" id="logsModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="logsTitle">Container Logs</h3>
        <button class="modal-close" onclick="closeLogsModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="log-content" id="logContent">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    let API_KEY = '';
    const API_BASE = window.location.origin;

    function authenticate() {
      API_KEY = document.getElementById('apiKeyInput').value;
      localStorage.setItem('monitorApiKey', API_KEY);
      document.getElementById('auth').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      fetchStats();
      fetchContainers();
      setInterval(fetchStats, 5000);
      setInterval(fetchContainers, 10000);
    }

    // Check saved API key
    const savedKey = localStorage.getItem('monitorApiKey');
    if (savedKey) {
      API_KEY = savedKey;
      document.getElementById('auth').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      fetchStats();
      fetchContainers();
      setInterval(fetchStats, 5000);
      setInterval(fetchContainers, 10000);
    }

    async function fetchStats() {
      try {
        const res = await fetch(`${API_BASE}/api/stats?apiKey=${API_KEY}`);
        if (res.status === 401) {
          localStorage.removeItem('monitorApiKey');
          location.reload();
          return;
        }
        const data = await res.json();

        // CPU
        document.getElementById('cpuValue').textContent = `${data.cpu.usage}%`;
        document.getElementById('cpuCores').textContent = `${data.cpu.cores} cores`;
        updateProgressBar('cpuBar', data.cpu.usage);

        // Memory
        document.getElementById('memValue').textContent = `${data.memory.usagePercent}%`;
        document.getElementById('memDetail').textContent =
          `${formatBytes(data.memory.used)} / ${formatBytes(data.memory.total)}`;
        updateProgressBar('memBar', data.memory.usagePercent);

        // Disk
        const mainDisk = data.disk.find(d => d.mount === '/') || data.disk[0];
        if (mainDisk) {
          document.getElementById('diskValue').textContent = `${mainDisk.usagePercent}%`;
          document.getElementById('diskDetail').textContent =
            `${formatBytes(mainDisk.used)} / ${formatBytes(mainDisk.size)}`;
          updateProgressBar('diskBar', mainDisk.usagePercent);
        }

        // Network
        const mainNet = data.network.find(n => n.interface !== 'lo') || data.network[0];
        if (mainNet) {
          document.getElementById('netValue').textContent =
            `${formatBytesPerSec(mainNet.rxSec)} / ${formatBytesPerSec(mainNet.txSec)}`;
          document.getElementById('netDetail').textContent =
            `RX: ${formatBytes(mainNet.rxBytes)} / TX: ${formatBytes(mainNet.txBytes)}`;
        }

        // Update time
        document.getElementById('lastUpdate').textContent =
          `Updated: ${new Date().toLocaleTimeString()}`;
      } catch (error) {
        console.error('Failed to fetch stats:', error);
      }
    }

    async function fetchContainers() {
      try {
        const res = await fetch(`${API_BASE}/api/containers?apiKey=${API_KEY}`);
        const containers = await res.json();

        const html = containers.map(c => `
          <div class="container-item">
            <div class="container-info">
              <div class="container-status ${getStatusClass(c.state)}"></div>
              <div>
                <div class="container-name">${c.name}</div>
                <div class="container-image">${c.image}</div>
              </div>
            </div>
            <div class="container-stats">
              ${c.stats ? `
                <span>CPU: ${c.stats.cpuPercent}%</span>
                <span>MEM: ${formatBytes(c.stats.memoryUsage)} (${c.stats.memoryPercent}%)</span>
              ` : `<span>${c.status}</span>`}
            </div>
            <div class="container-actions">
              <button class="btn-logs" onclick="showLogs('${c.id}', '${c.name}')">Logs</button>
              <button onclick="restartContainer('${c.id}')">Restart</button>
            </div>
          </div>
        `).join('');

        document.getElementById('containerList').innerHTML = html || 'No containers found';
      } catch (error) {
        console.error('Failed to fetch containers:', error);
      }
    }

    async function showLogs(containerId, containerName) {
      document.getElementById('logsModal').classList.add('active');
      document.getElementById('logsTitle').textContent = `Logs: ${containerName}`;
      document.getElementById('logContent').textContent = 'Loading...';

      try {
        const res = await fetch(`${API_BASE}/api/containers/${containerId}/logs?apiKey=${API_KEY}&tail=200`);
        const data = await res.json();
        document.getElementById('logContent').innerHTML =
          data.logs.map(line => `<div class="log-line">${escapeHtml(line)}</div>`).join('');

        // Scroll to bottom
        const logContent = document.getElementById('logContent');
        logContent.scrollTop = logContent.scrollHeight;
      } catch (error) {
        document.getElementById('logContent').textContent = 'Failed to load logs';
      }
    }

    function closeLogsModal() {
      document.getElementById('logsModal').classList.remove('active');
    }

    async function restartContainer(containerId) {
      if (!confirm('Restart this container?')) return;
      try {
        await fetch(`${API_BASE}/api/containers/${containerId}/restart?apiKey=${API_KEY}`, {
          method: 'POST'
        });
        alert('Container restart initiated');
        fetchContainers();
      } catch (error) {
        alert('Failed to restart container');
      }
    }

    function updateProgressBar(id, value) {
      const bar = document.getElementById(id);
      bar.style.width = `${value}%`;
      bar.className = 'progress-fill ' +
        (value > 80 ? 'progress-red' : value > 60 ? 'progress-yellow' : 'progress-green');
    }

    function getStatusClass(state) {
      if (state === 'running') return 'status-running';
      if (state === 'exited') return 'status-exited';
      return 'status-other';
    }

    function formatBytes(bytes) {
      if (!bytes) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function formatBytesPerSec(bytes) {
      return formatBytes(bytes) + '/s';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Close modal on escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLogsModal();
    });
  </script>
</body>
</html>
