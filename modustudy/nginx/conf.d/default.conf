# ===========================================
# Upstream 정의
# ===========================================
upstream backend {
    server backend:8080;
}

upstream sfu {
    server sfu-server:4000;
}

upstream recorder {
    server recorder:3001;
}

# ===========================================
# HTTP Server (80 → HTTPS 리다이렉트)
# ===========================================
server {
    listen 80;
    server_name i14d106.p.ssafy.io;

    # Let's Encrypt 인증서 갱신용
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지는 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# ===========================================
# HTTPS Server (443)
# ===========================================
server {
    listen 443 ssl http2;
    server_name i14d106.p.ssafy.io;

    # SSL 인증서
    ssl_certificate /etc/letsencrypt/live/i14d106.p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/i14d106.p.ssafy.io/privkey.pem;

    # SSL 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # =========================================
    # Frontend (React 정적 파일)
    # =========================================
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # =========================================
    # Backend API
    # =========================================
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================
    # Backend WebSocket (채팅, 알림)
    # =========================================
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # =========================================
    # SFU Server (Mediasoup 시그널링)
    # =========================================
    location /sfu/ {
        proxy_pass http://sfu/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # =========================================
    # Recorder Server
    # =========================================
    location /recorder/ {
        proxy_pass http://recorder;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # =========================================
    # Health Check
    # =========================================
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
