server:
  port: ${SERVER_PORT:8081}

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/conference?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ssafy
    password: ssafy
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}
  recorder:
    base-url: ${APP_RECORDER_BASE_URL:http://localhost:9100}
  processing:
    mock: true
  sfu:
    base-url: ${APP_SFU_BASE_URL:wss://localhost:4000}
    ice-servers:
      - urls: ${APP_STUN_URL:stun:stun.l.google.com:19302}
      - urls: ${APP_TURN_URL:}
        username: ${APP_TURN_USERNAME:}
        credential: ${APP_TURN_CREDENTIAL:}
